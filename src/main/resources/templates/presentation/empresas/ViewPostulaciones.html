<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/empresa/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/empresa/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/empresa/puestos">Mis puestos</a></li>
                <li class="nav-item"><a class="nav-link" href="/empresa/puestos/nuevo">Publicar puesto</a></li>
            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <h4>Postulaciones recibidas</h4>
    <p class="text-muted">
        Puesto: <strong th:text="${puesto.nombre}"></strong>
    </p>

    <div th:if="${#lists.isEmpty(postulaciones)}" class="alert alert-info mt-3">
        Aún no hay postulaciones para este puesto.
    </div>

    <table th:if="${!#lists.isEmpty(postulaciones)}"
           class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Identificación</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Fecha postulación</th>
            <th>Estado</th>
            <th>CV</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${postulaciones}">
            <td th:text="${p.oferente.nombre + ' ' + p.oferente.primerApellido}"></td>
            <td th:text="${p.oferente.identificacion}"></td>
            <td th:text="${p.oferente.correo}"></td>
            <td th:text="${p.oferente.telefono}"></td>
            <td th:text="${#temporals.format(p.fechaPostulacion, 'dd/MM/yyyy')}"></td>
            <td>
                <span class="badge"
                      th:classappend="${p.estado == 'PENDIENTE'} ? 'bg-warning text-dark' : 'bg-success'"
                      th:text="${p.estado}">
                </span>
            </td>
            <td>
                <a th:if="${p.oferente.rutaCurriculum != null and !#strings.isEmpty(p.oferente.rutaCurriculum)}"
                   th:href="${p.oferente.rutaCurriculum}"
                   target="_blank"
                   class="btn btn-sm btn-success">Ver CV</a>
                <span th:if="${p.oferente.rutaCurriculum == null or #strings.isEmpty(p.oferente.rutaCurriculum)}"
                      class="text-muted small">Sin CV</span>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/empresa/puestos" class="btn btn-outline-secondary mt-2">Volver</a>
</main>

</body>
</html>
