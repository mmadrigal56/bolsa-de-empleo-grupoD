<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <title>Empresa - Nuevo Puesto</title>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navEmpresa" aria-controls="navEmpresa"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="/empresa/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse" id="navEmpresa">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/puestos">Mis puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/empresa/puestos/nuevo">Publicar puesto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos}">Ver puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/reportes">Reportes</a>
                </li>
            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <h4>Publicar nuevo puesto</h4>

    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <div class="row mt-3">
        <div class="col-md-6">
            <div class="border rounded p-3 bg-light">
                <form th:action="@{/empresa/puestos/nuevo}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Nombre del puesto <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="nombre" class="form-control"
                               placeholder="Ej: Desarrollador Backend Java"
                               required th:value="${tempNombre}"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Descripción <span class="text-danger">*</span>
                        </label>
                        <textarea name="descripcion" class="form-control" rows="4"
                                  required minlength="10"
                                  placeholder="Describa el puesto y sus responsabilidades..."
                                  th:text="${tempDesc}"></textarea>
                        <div class="form-text">Mínimo 10 caracteres.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Salario <span class="text-danger">*</span>
                        </label>
                        <input type="text" name="salario" class="form-control"
                               placeholder="Ej: 1500000" required
                               th:value="${tempSalario}"/>
                        <div class="form-text">Solo números, sin símbolos ni comas.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Moneda <span class="text-danger">*</span>
                        </label>
                        <select name="moneda" class="form-select" required>
                            <option value="CRC"
                                    th:selected="${moneda == 'CRC' or moneda == null}">
                                ₡ Colón costarricense (CRC)
                            </option>
                            <option value="USD"
                                    th:selected="${moneda == 'USD'}">
                                $ Dólar estadounidense (USD)
                            </option>
                            <option value="EUR"
                                    th:selected="${moneda == 'EUR'}">
                                € Euro (EUR)
                            </option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Tipo de publicación <span class="text-danger">*</span>
                        </label>
                        <select name="esPublico" class="form-select" required>
                            <option value="" disabled
                                    th:selected="${tempPublico == null}">
                                 Seleccione
                            </option>
                            <option value="true"
                                    th:selected="${tempPublico == 'true'}">
                                Público (visible para todos)
                            </option>
                            <option value="false"
                                    th:selected="${tempPublico == 'false'}">
                                Privado (solo oferentes registrados)
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            Siguiente: agregar características
                        </button>
                        <a href="/empresa/dashboard" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
