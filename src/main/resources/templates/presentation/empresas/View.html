<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresas</title>
</head>
<body>
<div style="text-align: right; margin-bottom: 20px; padding: 10px; background-color: #f0f0f0;">
        <span th:if="${usuario != null}">
            Bienvenido: <strong th:text="${usuario.correo}"></strong>
            (Empresa)
        </span>
    <a href="/presentation/login/logout" style="margin-left: 20px; color: #0066cc;">Cerrar Sesión</a>
</div>
<h1>Empresas</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Localización</th>
        <th>Correo</th>
        <th>Teléfono</th>
        <th>Descripción</th>
        <th>Autorizada</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${empresas}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.localizacion}"></td>
        <td th:text="${e.correo}"></td>
        <td th:text="${e.telefono}"></td>
        <td th:text="${e.descripcion}"></td>
        <td th:text="${e.autorizada ? 'Sí' : 'No'}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
