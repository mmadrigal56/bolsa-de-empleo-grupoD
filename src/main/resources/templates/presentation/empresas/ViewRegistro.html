<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bolsa de Empleo - Registro Empresa</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
        }
        textarea { resize: vertical; min-height: 80px; }
        button {
            background-color: #0066cc; color: white; padding: 10px 20px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #0052a3; }
        .error { color: red; margin-bottom: 15px; padding: 10px; background-color: #ffeeee; border-radius: 4px; }
    </style>
</head>
<body>
<h1>Registro de Empresa</h1>

<div th:if="${error}" class="error" th:text="${error}"></div>

<form th:action="@{/registro/empresa}" method="post">
    <div class="form-group">
        <label>Nombre:</label>
        <input type="text" name="nombre" required/>
    </div>
    <div class="form-group">
        <label>Localización:</label>
        <input type="text" name="localizacion" required/>
    </div>
    <div class="form-group">
        <label>Correo electrónico:</label>
        <input type="email" name="correo" required/>
    </div>
    <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" name="clave" required minlength="8"/>
    </div>
    <div class="form-group">
        <label>Teléfono:</label>
        <input type="text" name="telefono" required/>
    </div>
    <div class="form-group">
        <label>Descripción:</label>
        <textarea name="descripcion" required></textarea>
    </div>

    <button type="submit">Registrarse</button>
</form>

<div style="margin-top: 20px; text-align: center;">
    <a href="/presentation/login" style="color: #0066cc;">¿Ya tenés cuenta? Iniciá sesión</a>
</div>
</body>
</html>
