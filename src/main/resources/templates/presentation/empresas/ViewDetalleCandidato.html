<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <title>Empresa - Detalle candidato</title>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navEmpresa" aria-controls="navEmpresa"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="/empresa/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse" id="navEmpresa">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/empresa/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/puestos">Mis puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/puestos/nuevo">Publicar puesto</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos}">Ver puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/empresa/reportes">Reportes</a>
                </li>
            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <h4>Detalle de oferente</h4>

    <div class="border rounded p-3 bg-light mb-4" style="max-width: 500px;">
        <p class="fw-bold fs-5 mb-2"
           th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></p>
        <p><span class="text-muted">Identificación:</span>
            <span th:text="${oferente.identificacion}"></span></p>
        <p><span class="text-muted">Email:</span>
            <span th:text="${oferente.correo}"></span></p>
        <p><span class="text-muted">Teléfono:</span>
            <span th:text="${oferente.telefono}"></span></p>
        <p><span class="text-muted">Residencia:</span>
            <span th:text="${oferente.lugarResidencia}"></span></p>

        <div th:if="${oferente.rutaCurriculum != null and !#strings.isEmpty(oferente.rutaCurriculum)}"
             class="mt-2">
            <a th:href="${oferente.rutaCurriculum}" target="_blank"
               class="btn btn-sm btn-success">Ver CV</a>
        </div>
        <p th:if="${oferente.rutaCurriculum == null or #strings.isEmpty(oferente.rutaCurriculum)}"
           class="text-muted small mt-2">Sin CV registrado.</p>
    </div>

    <h5>Habilidades</h5>
    <div th:if="${#lists.isEmpty(habilidades)}" class="text-muted fst-italic">
        Este oferente no tiene habilidades registradas.
    </div>
    <table th:if="${!#lists.isEmpty(habilidades)}"
           class="table table-bordered table-sm mt-2" style="max-width: 500px;">
        <thead class="table-secondary">
        <tr>
            <th>Característica</th>
            <th>Nivel</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="h : ${habilidades}">
            <td th:text="${h.caracteristica.nombre}"></td>
            <td th:text="${h.nivel}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/empresa/candidatos/buscar(puestoId=${puesto.id})}"
       class="btn btn-outline-secondary mt-3">Volver</a>
</main>

</body>
</html>
