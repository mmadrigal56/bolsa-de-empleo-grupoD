<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Puesto Característica</title>
</head>
<body>
<h1>Requisitos por Puesto</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Puesto</th>
        <th>Característica</th>
        <th>Nivel Requerido</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="pc : ${puestoCaracteristica}">
        <td th:text="${pc.id}"></td>
        <td th:text="${pc.puesto.descripcion}"></td>
        <td th:text="${pc.caracteristica.nombre}"></td>
        <td th:text="${pc.nivel}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
