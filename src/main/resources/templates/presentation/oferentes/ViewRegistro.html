<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/presentation/oferentes/ViewRegistro.css}">
    <title>Bolsa de Empleo - Registro Oferente</title>
</head>
<body>
<h1>Registro de Oferente</h1>

<div th:if="${error}" class="error" th:text="${error}"></div>

<form th:action="@{/registro/oferente}" method="post">
    <div class="form-group">
        <label>Identificación:</label>
        <input type="text" name="identificacion" required/>
    </div>
    <div class="form-group">
        <label>Nombre:</label>
        <input type="text" name="nombre" required/>
    </div>
    <div class="form-group">
        <label>Primer Apellido:</label>
        <input type="text" name="primerApellido" required/>
    </div>
    <div class="form-group">
        <label>Nacionalidad:</label>
        <input type="text" name="nacionalidad" required/>
    </div>
    <div class="form-group">
        <label>Teléfono:</label>
        <input type="text" name="telefono" required/>
    </div>
    <div class="form-group">
        <label>Correo electrónico:</label>
        <input type="email" name="correo" required/>
    </div>
    <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" name="clave" required minlength="8"/>
    </div>
    <div class="form-group">
        <label>Lugar de Residencia:</label>
        <input type="text" name="lugarResidencia" required/>
    </div>

    <button type="submit">Registrarse</button>
</form>

<div style="margin-top: 20px; text-align: center;">
    <a href="/presentation/login" style="color: #0066cc;">¿Ya tenés cuenta? Iniciá sesión</a>
</div>
</body>
</html>
