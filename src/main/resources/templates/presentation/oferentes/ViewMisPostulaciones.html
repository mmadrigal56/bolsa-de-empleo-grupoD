<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navOferente" aria-controls="navOferente"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="/oferente/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse" id="navOferente">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/oferente/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/habilidades">Mis habilidades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/cv">Mi CV</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos}">Ver puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/postulacion">Postularme</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/buscar-puestos">Buscar puestos</a>
                </li>

            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>
<main class="container mt-4">
    <h4>Mis postulaciones</h4>
    <p class="text-muted">
        Nombre: <strong th:text="${oferente.nombre}"></strong>
    </p>

    <div th:if="${#lists.isEmpty(postulaciones)}" class="alert alert-info mt-3">
        Aún no haz aplicado a ningún puesto.
    </div>

    <table th:if="${!#lists.isEmpty(postulaciones)}"
           class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>Puesto</th>
            <th>Empresa</th>
            <th>Salario</th>
            <th>Fecha postulación</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${postulaciones}">
            <td th:text="${p.puesto.nombre}"></td>
            <td th:text="${p.puesto.empresa.nombre}"></td>
            <td th:with="simbolo=${p.puesto.moneda == 'USD' ? '$' : (p.puesto.moneda == 'EUR' ? '€' : '₡')}"
                th:text="${simbolo + ' ' + #numbers.formatDecimal(p.puesto.salario, 1, 'POINT', 2, 'COMMA')}">
            </td>
            <td th:text="${#temporals.format(p.fechaPostulacion, 'dd/MM/yyyy')}"></td>
            <td>
                <span class="badge"
                      th:classappend="${p.estado == 'PENDIENTE'} ? 'bg-warning text-dark' : 'bg-success'"
                      th:text="${p.estado}">
                </span>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/oferente/dashboard" class="btn btn-outline-secondary mt-2">Volver</a>
</main>

</body>
</html>
