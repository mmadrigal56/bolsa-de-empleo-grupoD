<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oferente - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navOferente" aria-controls="navOferente"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="/oferente/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse" id="navOferente">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/oferente/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/habilidades">Mis habilidades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/cv">Mi CV</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos}">Ver puestos</a>
                </li>
            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <h4 class="fw-bold mb-1">Oferente - Dashboard</h4>
    <p class="text-muted mb-4">Administrá tus habilidades y tu CV.</p>

    <a href="/oferente/habilidades" class="btn btn-primary me-2">Mis habilidades</a>
    <a href="/oferente/cv" class="btn btn-primary me-2">Mi CV</a>
    <a href="/puestos" class="btn btn-outline-secondary">Ver puestos</a>
</main>

</body>
</html>
