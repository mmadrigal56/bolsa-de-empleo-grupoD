<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <title>Mi CV</title>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/oferente/dashboard">BolsaEmpleo</a>
        <div class="collapse navbar-collapse" id="navOferente">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/oferente/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/habilidades">Mis habilidades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/cv">Mi CV</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos}">Ver puestos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/oferente/postulacion">Postularme</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/buscar-puestos">Buscar puestos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/oferente/postulaciones">Ver mis postulaciones</a>
                </li>

            </ul>
            <span class="text-light me-3 small" th:text="${usuario?.correo}"></span>
            <a href="/presentation/login/logout" class="btn btn-sm btn-secondary">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <h4 class="fw-bold">Mi CV</h4>

    <div class="row">
        <div class="col-md-6">

            <!-- Si ya tiene CV -->
            <div th:if="${usuario.rutaCurriculum != null and !#strings.isEmpty(usuario.rutaCurriculum)}">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <p class="mb-3">Tu CV está registrado:</p>

                <div class="d-flex gap-2">
                    <a th:href="${usuario.rutaCurriculum}"
                       class="btn btn-success" target="_blank">Ver mi CV</a>

                    <form th:action="@{/oferente/cv/eliminar}" method="post">
                        <button type="submit" class="btn btn-danger">Eliminar CV</button>
                    </form>
                </div>

                <div th:if="${urlPreview != null}" class="mb-4">
                    <p class="fw-semibold">Vista previa:</p>
                    <iframe th:src="${urlPreview}"
                            width="100%" height="500px"
                            style="border: 1px solid #dee2e6; border-radius: 8px;"
                            allowfullscreen>
                    </iframe>
                </div>

                <h6 class="mt-3">Actualizar link:</h6>
                <form th:action="@{/oferente/cv}" method="post">
                    <div class="mb-3">
                        <input type="text" name="rutaCurriculum"
                               class="form-control"
                               th:value="${usuario.rutaCurriculum}"/>
                    </div>
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                </form>
            </div>

            <!-- Si no tiene CV -->
            <div th:if="${usuario.rutaCurriculum == null or #strings.isEmpty(usuario.rutaCurriculum)}">
                <p class="text-muted">No tenés ningún CV registrado aún.</p>
                <form th:action="@{/oferente/cv}" method="post">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div class="mb-3">
                        <label class="form-label">Link de tu CV:</label>
                        <input type="text" name="rutaCurriculum"
                               class="form-control"
                               placeholder="Link de Google Drive o OneDrive" required/>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </form>
            </div>

            <a href="/oferente/dashboard" class="d-block text-primary">
                ← Volver al Dashboard
            </a>

        </div>
    </div>
</main>

</body>
</html>
