<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi CV</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button {
            background-color: #0066cc; color: white; padding: 10px 20px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #0052a3; }
        .cv-link {
            display: inline-block; margin: 20px 0; padding: 10px 20px;
            background-color: #28a745; color: white; text-decoration: none; border-radius: 4px;
        }
        .cv-link:hover { background-color: #218838; }
        .btn-volver { color: #0066cc; text-decoration: none; display: block; margin-top: 20px; }
    </style>
</head>
<body>

<h1>Mi CV</h1>

<!-- Si ya tiene CV -->
<div th:if="${usuario.rutaCurriculum != null and !#strings.isEmpty(usuario.rutaCurriculum)}">
    <p>Tu CV está registrado:</p>
    <a th:href="${usuario.rutaCurriculum}" class="cv-link" target="_blank">Ver mi CV</a>

    <h3 style="margin-top: 30px;">Actualizar link:</h3>
    <form th:action="@{/oferente/cv}" method="post">
        <div class="form-group">
            <input type="text" name="rutaCurriculum"
                   th:value="${usuario.rutaCurriculum}"/>
        </div>
        <button type="submit">Actualizar</button>
    </form>
</div>

<!-- Si no tiene CV -->
<div th:if="${usuario.rutaCurriculum == null or #strings.isEmpty(usuario.rutaCurriculum)}">
    <p style="color: #666;">No tenés ningún CV registrado aún.</p>
    <form th:action="@{/oferente/cv}" method="post">
        <div class="form-group">
            <label>Link de tu CV:</label>
            <input type="text" name="rutaCurriculum"
                   placeholder="Link de Google Drive o OneDrive" required/>
        </div>
        <button type="submit">Guardar</button>
    </form>
</div>

<a href="/oferente/dashboard" class="btn-volver">← Volver al Dashboard</a>

</body>
</html>
