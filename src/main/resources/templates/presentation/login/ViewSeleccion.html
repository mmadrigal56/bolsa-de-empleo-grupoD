<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .opciones { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        a.btn {
            background-color: #0066cc; color: white; padding: 15px;
            text-align: center; text-decoration: none; border-radius: 4px; font-size: 16px;
        }
        a.btn:hover { background-color: #0052a3; }
    </style>
</head>
<body>
<h1>¿Cómo desea registrarse?</h1>
<div class="opciones">
    <a class="btn" href="/registro/empresa">Soy una Empresa</a>
    <a class="btn" href="/registro/oferente">Soy un Oferente</a>
    <a class="btn" href="/registro/administrador">ADMIN BORRARLO</a>
</div>
<div style="margin-top: 20px; text-align: center;">
    <a href="/presentation/login" style="color: #0066cc;">¿Ya tenés cuenta? Iniciá sesión</a>
</div>
</body>
</html>
