<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/presentation/login/View.css}">
    <title>Bolsa de Empleo - Login</title>
</head>
<body>
<h1>Bolsa de Empleo</h1>


<div th:if="${error}" class="error" th:text="${error}"></div>

<form action="#" th:action="@{/presentation/login}" method="post">
    <div class="form-group">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required
               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
               title="Ingrese un correo válido">
    </div>

    <div class="form-group">
        <label for="clave">Contraseña:</label>
        <input type="password" id="clave" name="clave" required
               minlength="8" title="La contraseña debe tener al menos 8 caracteres">
    </div>

    <button type="submit">Iniciar Sesión</button>
</form>
<div style="margin-top: 20px; text-align: center;">
    <a href="/" style="color: #0066cc;">Volver al inicio</a>
</div>
</body>
</html>
