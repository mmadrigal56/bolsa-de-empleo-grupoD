<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bolsa de Empleo - Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;
        }
        button {
            background-color: #0066cc; color: white; padding: 10px 20px;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #0052a3; }
        .error { color: red; margin-bottom: 15px; padding: 10px; background-color: #ffeeee; border-radius: 4px; }
        .info { background-color: #e8f4fd; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .info p { margin: 5px 0; }
    </style>
</head>
<body>
<h1>Bolsa de Empleo</h1>


<div th:if="${error}" class="error" th:text="${error}"></div>

<form action="#" th:action="@{/presentation/login}" method="post">
    <div class="form-group">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required
               pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
               title="Ingrese un correo válido">
    </div>

    <div class="form-group">
        <label for="clave">Contraseña:</label>
        <input type="password" id="clave" name="clave" required
               minlength="8" title="La contraseña debe tener al menos 8 caracteres">
    </div>

    <button type="submit">Iniciar Sesión</button>
</form>
<div style="margin-top: 20px; text-align: center;">
    <a href="/" style="color: #0066cc;">Volver al inicio</a>
</div>
</body>
</html>
